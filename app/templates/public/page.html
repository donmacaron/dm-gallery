{% extends "base.html" %}
{% block title %}{{ site_title }}{% endblock %}

{% block extra_css %}
<style>
.page-content {
  max-width: 780px;
}
.page-content h1 { font-size:2rem; margin-bottom:1.25rem; letter-spacing:0.04em; }
.page-content h2 { font-size:1.6rem; margin:1.75rem 0 0.85rem; letter-spacing:0.04em; }
.page-content h3 { font-size:1.3rem; margin:1.5rem 0 0.7rem; }
.page-content p  { margin-bottom:1rem; line-height:1.7; }
.page-content a  { color:var(--accent); }
.page-content a:hover { color:var(--fg); }
.page-content ul, .page-content ol {
  margin: 0.75rem 0 1rem 1.5rem; line-height:1.7;
}
.page-content blockquote {
  border-left:3px solid var(--accent); margin:1rem 0;
  padding:0.5rem 1rem; color:var(--border2); font-style:italic;
}
.page-content pre {
  background:#0c0c0c; border:1px solid var(--border);
  padding:0.75rem 1rem; overflow-x:auto; font-size:0.88rem;
  margin:1rem 0;
}
.page-content img {
  max-width:100%; height:auto; display:block;
  border:1px solid var(--border); margin:1rem 0;
  cursor:pointer;
}
.page-content img:hover { border-color:var(--accent); }

/* ── Album card embed (Polaroid style) ── */
.album-card-embed {
  display: inline-block;
  max-width: 260px;
  width: 100%;
  text-decoration: none;
  margin: 0.5rem 0.75rem 0.5rem 0;
  vertical-align: top;
  /* Polaroid frame */
  background: #f2f0eb;
  padding: 12px 12px 0 12px;
  /* Subtle shadow for depth */
  box-shadow:
    0 2px 8px rgba(0,0,0,0.25),
    0 1px 3px rgba(0,0,0,0.15);
  /* Slight random tilt for organic feel */
  transform: rotate(-1.2deg);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.album-card-embed:hover {
  transform: rotate(0deg) translateY(-3px);
  box-shadow:
    0 8px 24px rgba(0,0,0,0.35),
    0 2px 6px rgba(0,0,0,0.2);
}
.album-card-embed-img {
  width: 100%;
  overflow: hidden;
}
.album-card-embed-img img {
  width: 100%;
  height: auto;
  display: block;
  margin: 0;
  border: none;
  cursor: pointer;
  transition: transform 0.3s;
}
.album-card-embed:hover .album-card-embed-img img {
  transform: scale(1.03);
}
.album-card-embed-img .album-card-no-img {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
  font-size: 1.5rem;
}
/* Thick white bottom strip — the Polaroid caption area */
.album-card-embed-title {
  padding: 14px 4px 16px 4px;
  font-size: 0.88rem;
  font-family: 'Share Tech Mono', monospace;
  color: #1a1a1a;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.03em;
  line-height: 1.2;
}

</style>
{% endblock %}

{% block content %}
<article class="page-content">

  <h1>{{ page.title }}</h1>

  {% if page.cover_url %}
  <div style="margin-bottom:1.5rem;">
    <img src="{{ page.cover_url }}" alt="{{ page.title }}"
         style="max-width:100%;height:auto;border:1px solid var(--border);display:block;">
  </div>
  {% endif %}

  <div class="page-body">
    {{ content_html | safe }}
  </div>

</article>
{% endblock %}
