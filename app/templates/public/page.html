{% extends "base.html" %}
{% block title %}{{ site_title }}{% endblock %}

{% block extra_css %}
<style>
.page-content {
  max-width: 780px;
}
.page-content h1 { font-size:2rem; margin-bottom:1.25rem; letter-spacing:0.04em; }
.page-content h2 { font-size:1.6rem; margin:1.75rem 0 0.85rem; letter-spacing:0.04em; }
.page-content h3 { font-size:1.3rem; margin:1.5rem 0 0.7rem; }
.page-content p  { margin-bottom:1rem; line-height:1.7; }
.page-content a  { color:var(--accent); }
.page-content a:hover { color:var(--fg); }
.page-content ul, .page-content ol {
  margin: 0.75rem 0 1rem 1.5rem; line-height:1.7;
}
.page-content blockquote {
  border-left:3px solid var(--accent); margin:1rem 0;
  padding:0.5rem 1rem; color:var(--border2); font-style:italic;
}
.page-content pre {
  background:#0c0c0c; border:1px solid var(--border);
  padding:0.75rem 1rem; overflow-x:auto; font-size:0.88rem;
  margin:1rem 0;
}
.page-content img {
  max-width:100%; height:auto; display:block;
  border:1px solid var(--border); margin:1rem 0;
  cursor:pointer;
}
.page-content img:hover { border-color:var(--accent); }
</style>
{% endblock %}

{% block content %}
<article class="page-content">

  <h1>{{ page.title }}</h1>

  {% if page.cover_url %}
  <div style="margin-bottom:1.5rem;">
    <img src="{{ page.cover_url }}" alt="{{ page.title }}"
         style="max-width:100%;height:auto;border:1px solid var(--border);display:block;">
  </div>
  {% endif %}

  <div class="page-body">
    {{ content_html | safe }}
  </div>

</article>
{% endblock %}
