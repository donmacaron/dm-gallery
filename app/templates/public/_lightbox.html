<!-- Lightbox overlay -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">

  <div class="lightbox-controls">
    <span class="lightbox-counter" id="lbCounter">1 / 1</span>
    <span class="lightbox-filename" id="lbFilename"></span>
    <button class="lightbox-close" onclick="closeLightbox()" title="Close (Esc)">[ ESC ]</button>
  </div>

  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)" title="Previous (←)">◄</button>

  <div style="position:relative; display:flex; align-items:center; justify-content:center; max-width:90vw; max-height:80vh;">
    <img class="lightbox-img" id="lbImg" src="" alt="" draggable="false"
         style="opacity:0; transition:opacity 0.2s;" onload="this.style.opacity=1">
    <!-- Loading spinner shown while image loads -->
    <div id="lbSpinner" style="position:absolute; font-size:0.8rem; color:#333; letter-spacing:0.1em;">
      loading<span class="blink">█</span>
    </div>
  </div>

  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)" title="Next (→)">►</button>

  <div class="lightbox-bottom">
    <a id="lbDl2k"   href="#" class="lightbox-dl hi"  download title="Download 2K WebP version">⬇ 2K VERSION</a>
    <a id="lbDlOrig" href="#" class="lightbox-dl"     download title="Download original file">⬇ ORIGINAL</a>
    <span id="lbDims" style="font-size:0.7rem; color:#333; letter-spacing:0.06em;"></span>
  </div>

</div>

<script>
let _lbIdx = 0;

function openLightbox(idx) {
  _lbIdx = idx;
  _lbUpdate();
  document.getElementById('lightbox').classList.add('is-open');
  document.body.style.overflow = 'hidden';
  document.getElementById('lightbox').focus();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('is-open');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  if (!MEDIA.length) return;
  _lbIdx = (_lbIdx + dir + MEDIA.length) % MEDIA.length;
  _lbUpdate();
}

function _lbUpdate() {
  const m      = MEDIA[_lbIdx];
  const img    = document.getElementById('lbImg');
  const spinner= document.getElementById('lbSpinner');

  // Show spinner while loading
  img.style.opacity = '0';
  spinner.style.display = 'block';

  const src = m.webPath ? '/media/' + m.webPath : '';
  img.src = src;
  img.onload  = () => { spinner.style.display = 'none'; img.style.opacity = '1'; };
  img.onerror = () => { spinner.style.display = 'none'; img.style.opacity = '0.3'; };

  document.getElementById('lbCounter').textContent  = (_lbIdx + 1) + ' / ' + MEDIA.length;
  document.getElementById('lbFilename').textContent = m.name || '';
  document.getElementById('lbDl2k').href            = '/download/' + m.id + '/web';
  document.getElementById('lbDlOrig').href          = '/download/' + m.id + '/original';

  // Show dimensions if available
  const dims = document.getElementById('lbDims');
  dims.textContent = m.w && m.h ? m.w + '×' + m.h : '';

  // Preload neighbours
  const preload = (i) => {
    const p = MEDIA[(i + MEDIA.length) % MEDIA.length];
    if (p && p.webPath) { const x = new Image(); x.src = '/media/' + p.webPath; }
  };
  preload(_lbIdx + 1);
  preload(_lbIdx - 1);
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('is-open')) return;
  if (e.key === 'Escape')     { closeLightbox();    return; }
  if (e.key === 'ArrowLeft')  { lightboxNav(-1);    return; }
  if (e.key === 'ArrowRight') { lightboxNav(1);     return; }
  if (e.key === 'ArrowUp')    { lightboxNav(-1);    return; }
  if (e.key === 'ArrowDown')  { lightboxNav(1);     return; }
});

// Click backdrop to close
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target.id === 'lightbox') closeLightbox();
});
</script>
