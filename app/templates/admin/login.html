<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — {{ site_title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/crt.css">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

  <div class="login-wrap">
    <div class="login-box">

      <div class="login-title">[ADMIN ACCESS]</div>
      <div class="login-sub">{{ site_title }} │ RESTRICTED TERMINAL</div>

      {% if error %}
      <div class="login-error">! {{ error }}</div>
      {% endif %}

      <form method="post" action="/admin/login">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username"
                 autocomplete="username" autofocus required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%; margin-top:0.5rem; font-size:1.1rem;">
          &gt; AUTHENTICATE
        </button>
      </form>

      <div style="margin-top:1.75rem; font-size:0.75rem; color:#1a1a1a; text-align:center; letter-spacing:0.08em;">
        SYSTEM READY <span class="blink">█</span>
      </div>
    </div>
  </div>

</body>
</html>
