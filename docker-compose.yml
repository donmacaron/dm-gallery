# ═══════════════════════════════════════════
# Don Macaron Gallery — Server Production
# Traefik-integrated, originals on 1tb drive
# ═══════════════════════════════════════════
version: "3.9"

services:

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Processed media + thumbnails (local SSD)
      - ./data/media:/app/data/media
      # SQLite database (local SSD)
      - ./data/db:/app/data/db
      # Originals on 1TB drive
      - /mnt/1tb-drive/dm-gallery-storage/originals:/app/data/originals
      # Pre-built ZIPs on 1TB drive
      - /mnt/1tb-drive/dm-gallery-storage/zips:/app/data/zips
    networks:
      - traefik_default
      - gallery_net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_default"
      
      # 1. Define the custom transport directly in Docker labels
      - "traefik.http.serverstransports.upload-transport.respondingtimeouts.idleconntimeout=600s"
      - "traefik.http.serverstransports.upload-transport.respondingtimeouts.readtimeout=600s"
      - "traefik.http.serverstransports.upload-transport.respondingtimeouts. some.writetimeout=600s"
      - "traefik.http.serverstransports.upload-transport.dialtimeout=30s"
      - "traefik.http.serverstransports.upload-transport.dialkeepalive=30s"

      # HTTPS router
      - "traefik.http.routers.dm-gallery1.rule=Host(`donmacaron.net`)"
      - "traefik.http.routers.dm-gallery1.entrypoints=webs"
      - "traefik.http.routers.dm-gallery1.tls.certresolver=myresolver"
      
      # 2. Apply it to your service (explicitly naming it with @docker since it's defined here)
      - "traefik.http.services.dm-gallery1.loadbalancer.server.port=8000"
      - "traefik.http.services.dm-gallery1.loadbalancer.serversTransport=upload-transport@docker"
      
      # HTTP → HTTPS redirect router
      - "traefik.http.routers.dm-gallery2.rule=Host(`donmacaron.net`)"
      - "traefik.http.routers.dm-gallery2.entrypoints=web"
      - "traefik.http.routers.dm-gallery2.middlewares=redirect-to-https"
      
      # Redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.port=443"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  traefik_default:
    external: true
  gallery_net:
    driver: bridge
